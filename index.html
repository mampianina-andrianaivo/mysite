/* =============================================
   TRANSITION OVERLAY — blur gaussien au retour
   ============================================= */
#transitionOverlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9998; /* juste sous le blog overlay */
  pointer-events: none;
  opacity: 0;
  /* flou + assombrir légèrement */
  backdrop-filter: blur(18px) brightness(0.6);
  -webkit-backdrop-filter: blur(18px) brightness(0.6);
  background: rgba(0, 0, 0, 0.35);
  transition: opacity 0s; /* contrôlé par JS */
}

#transitionOverlay.visible {
  opacity: 1;
  pointer-events: all;
}

#transitionOverlay.fading-out {
  opacity: 0;
  transition: opacity 0.55s ease-out;
}

/* Spinner centré dans l'overlay de transition */
#transitionOverlay .spinner-wrap {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
}

  width: 36px; height: 36px;

<!-- OVERLAY DE TRANSITION (blur gaussien pendant le repositionnement) -->
<div id="transitionOverlay">

    <div class="spinner"></div>
    <span class="spinner-label">retour...</span>

<script>
document.addEventListener('touchmove', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
}, false);

document.addEventListener('wheel', function(e) {
  if (e.ctrlKey) e.preventDefault();
}, { passive: false });

let CONFIG = {};
let sections = [];
let blogPosts = [];

async function loadConfig() {
  try {
    const response = await fetch('config.ini');
    if (!response.ok) throw new Error('config.ini non trouvé');
    const text = await response.text();
    const lines = text.split('\n');
    CONFIG = { images: [], markdownFiles: [] };
    let currentSection = '';
    lines.forEach(line => {
      line = line.trim();
      if (!line || line.startsWith('#') || line.startsWith(';')) return;
      if (line.startsWith('[') && line.endsWith(']')) {
        currentSection = line.slice(1, -1).toLowerCase();
        return;
      }
      const [key, ...valueParts] = line.split('=');
      const value = valueParts.join('=').trim();
      if (!key || !value) return;
      const cleanKey = key.trim();
      if (currentSection === 'images') {
        if (cleanKey === 'range') {
          const match = value.match(/(\d+)-(\d+)/);
          if (match) {
            const start = parseInt(match[1]);
            const end = parseInt(match[2]);
            for (let i = start; i <= end; i++) CONFIG.images.push(`${i}.jpg`);
          }
        }
      } else if (currentSection === 'files') {
        if (cleanKey === 'list') {
          CONFIG.markdownFiles = value.split(',').map(n => n.trim()).filter(n => n);
        }
      }
    });
    return true;
  } catch (error) {
    console.error('Erreur config:', error);
    return false;
  }
}

function generateDesktopCarousel() {
  const indicators = document.getElementById('desktop-indicators');
  const carouselInner = document.getElementById('desktop-carousel-inner');
  CONFIG.images.forEach((img, index) => {
    const li = document.createElement('li');
    li.setAttribute('data-target', '#demo-desktop');
    li.setAttribute('data-slide-to', index);
    if (index === 0) li.className = 'active';
    indicators.appendChild(li);
    const div = document.createElement('div');
    div.className = 'carousel-item' + (index === 0 ? ' active' : '');
    div.innerHTML = `<img src="${img}" alt="Photo ${index + 1}">`;
    carouselInner.appendChild(div);
  });
}

function extractTitleFromMarkdown(text) {
  const match = text.match(/^##\s+(.+)$/m);
  const title = match ? match[1].trim() : 'Sans titre';
  const contentWithoutTitle = text.replace(/^##\s+.+$/m, '').trim();
  return { title, content: contentWithoutTitle };
}

function extractExcerpt(htmlContent) {
  const div = document.createElement('div');
  div.innerHTML = htmlContent;
  const text = div.textContent || div.innerText;
  const trimmed = text.substring(0, 100).trim();
  if (text.length > 100) return trimmed.replace(/\s+\S*$/, '') + '[...]';
  return trimmed;
}

function parseBlogPosts(markdownContent) {
  const posts = [];
  const lines = markdownContent.split('\n');
  let currentPost = null;
  let contentLines = [];
  let postsContent = [];
  lines.forEach((line, idx) => {
    if (line.startsWith('#### ')) {
      if (currentPost) {
        const htmlContent = marked.parse(contentLines.join('\n'));
        posts.push({ title: currentPost, content: htmlContent, excerpt: extractExcerpt(htmlContent) });
      }
      currentPost = line.replace(/^#### /, '').trim();
      contentLines = [];
      postsContent.push(idx);
    } else if (currentPost) {
      contentLines.push(line);
      postsContent.push(idx);
    }
  });
  if (currentPost && contentLines.length > 0) {
    const htmlContent = marked.parse(contentLines.join('\n'));
    posts.push({ title: currentPost, content: htmlContent, excerpt: extractExcerpt(htmlContent) });
  }
  const withoutPosts = lines.filter((_, idx) => !postsContent.includes(idx)).join('\n').trim();
  return { posts, contentWithoutPosts: withoutPosts };
}

async function loadMarkdownFile(fileName, index) {
  try {
    const response = await fetch(`${fileName}.md`);
    if (!response.ok) { console.warn(`${fileName}.md non trouvé`); return null; }
    const text = await response.text();
    const { title, content } = extractTitleFromMarkdown(text);
    const { posts, contentWithoutPosts } = parseBlogPosts(content);
    const htmlContent = marked.parse(contentWithoutPosts);
    if (posts.length > 0) blogPosts.push(...posts);
    return { id: `section-${index + 1}`, label: title, content: htmlContent, posts };
  } catch (error) {
    console.error(`Erreur ${fileName}.md:`, error);
    return null;
  }
}

async function loadAllMarkdownFiles() {
  const promises = CONFIG.markdownFiles.map((n, i) => loadMarkdownFile(n, i));
  const results = await Promise.all(promises);
  sections = results.filter(s => s !== null);
}

function generateMenu() {
  sections.forEach((section) => {
    ['mobile-menu', 'desktop-menu'].forEach(menuId => {
      const li = document.createElement('li');
      li.className = 'nav-item';
      const a = document.createElement('a');
      a.className = 'nav-link';
      a.href = '#' + section.id;
      a.textContent = section.label;
      li.appendChild(a);
      document.getElementById(menuId).appendChild(li);
    });
  });
}

function generateFirstSection() {
  const images = CONFIG.images.map((img, i) => `
    <div class="carousel-item ${i === 0 ? 'active' : ''}">
      <img src="${img}" alt="Photo ${i + 1}">
    </div>`).join('');
  const indicators = CONFIG.images.map((_, i) => `
    <li data-target="#demo" data-slide-to="${i}" class="${i === 0 ? 'active' : ''}"></li>`).join('');
  return `
    <div class="carousel-container carousel-mobile-only">
      <div id="demo" class="carousel slide" data-ride="carousel">
        <ul class="carousel-indicators">${indicators}</ul>
        <div class="carousel-inner">${images}</div>
        <a class="carousel-control-prev" href="#demo" data-slide="prev"><span class="carousel-control-prev-icon"></span></a>
        <a class="carousel-control-next" href="#demo" data-slide="next"><span class="carousel-control-next-icon"></span></a>
      </div>
    </div>`;
}

// ============================================================================
// TRANSITION OVERLAY — blur gaussien pendant le repositionnement
// ============================================================================
const transitionOverlay = document.getElementById('transitionOverlay');

function showTransitionOverlay() {
  // Supprime un éventuel fade-out en cours
  transitionOverlay.classList.remove('fading-out');
  transitionOverlay.style.transition = 'opacity 0s';
  transitionOverlay.classList.add('visible');
}

function hideTransitionOverlay() {
  // Force un reflow pour que la transition CSS s'applique proprement
  transitionOverlay.offsetHeight;
  transitionOverlay.classList.add('fading-out');
  transitionOverlay.classList.remove('visible');

  // Nettoyage après la fin de la transition (0.55s)
  const cleanup = () => {
    transitionOverlay.classList.remove('fading-out');
    transitionOverlay.style.transition = '';
    transitionOverlay.removeEventListener('transitionend', cleanup);
  };
  transitionOverlay.addEventListener('transitionend', cleanup, { once: true });
}

// ============================================================================
// GESTION OVERLAY BLOG — avec History API + transition blur au retour
// ============================================================================
class OverlayManager {
  constructor() {
    this.overlay = null;
    this.overlayScroll = null;
    this.isOpen = false;
    this.savedScrollTop = 0;
    this._scrollTarget = '';
    this._onPopState = null;
    this._onKeyDown = null;
    this._onOverlayClick = null;
    this.init();
  }

  init() {
    this.overlay = document.getElementById('blogOverlay');
    this.overlayScroll = document.getElementById('blogOverlayScroll');

    this.overlay.addEventListener('touchmove', (e) => {
      if (this.isOpen) {
        if (this.overlayScroll.scrollHeight > this.overlayScroll.clientHeight) return;
        e.preventDefault();
      }
    }, { passive: false });

    this.overlay.addEventListener('wheel', (e) => {
      if (this.isOpen) {
        if (this.overlayScroll.scrollHeight > this.overlayScroll.clientHeight) return;
        e.preventDefault();
      }
    }, { passive: false });
  }

  open(content) {
    if (this.isOpen) return;
    this.isOpen = true;

    // Détecter la source du scroll (desktop vs mobile)
    const mainContainer = document.querySelector('.main-container');
    const isMobile = window.innerWidth <= 800;
    if (isMobile || !mainContainer) {
      this.savedScrollTop = window.scrollY || window.pageYOffset;
      this._scrollTarget = 'window';
    } else {
      this.savedScrollTop = mainContainer.scrollTop;
      this._scrollTarget = 'container';
    }

    this.overlayScroll.innerHTML = content;
    this.overlay.classList.add('active');
    this.lockBodyScroll();

    // History API : crée une entrée fictive pour intercepter le bouton retour
    history.pushState({ overlay: true }, '');

    this._onPopState = () => {
      if (this.isOpen) this._closeWithoutHistory();
    };
    window.addEventListener('popstate', this._onPopState);

    const closeBtn = document.getElementById('blogOverlayClose');
    if (closeBtn) closeBtn.addEventListener('click', () => this.close());

    this._onOverlayClick = (e) => {
      if (e.target === this.overlay) this.close();
    };
    this.overlay.addEventListener('click', this._onOverlayClick);

    this._onKeyDown = (e) => {
      if (e.key === 'Escape' && this.isOpen) this.close();
    };
    document.addEventListener('keydown', this._onKeyDown);
  }

  // Fermeture via bouton ↵ ou Escape
  close() {
    if (!this.isOpen) return;
    if (this._onPopState) {
      window.removeEventListener('popstate', this._onPopState);
      this._onPopState = null;
    }
    history.go(-1);
    this._closeWithoutHistory();
  }

  // Fermeture sans toucher à l'historique (popstate ou close())
  _closeWithoutHistory() {
    if (!this.isOpen) return;
    this.isOpen = false;

    // 1. Afficher immédiatement le blur de transition
    showTransitionOverlay();

    // 2. Masquer l'overlay blog
    this.overlay.classList.remove('active');
    this.unlockBodyScroll();
    this.overlayScroll.innerHTML = '';

    // Nettoyer les listeners
    if (this._onOverlayClick) {
      this.overlay.removeEventListener('click', this._onOverlayClick);
      this._onOverlayClick = null;
    }
    if (this._onKeyDown) {
      document.removeEventListener('keydown', this._onKeyDown);
      this._onKeyDown = null;
    }
    if (this._onPopState) {
      window.removeEventListener('popstate', this._onPopState);
      this._onPopState = null;
    }

    // 3. Repositionner le scroll en arrière-plan (invisible grâce au blur)
    requestAnimationFrame(() => {
      if (this._scrollTarget === 'window') {
        window.scrollTo(0, this.savedScrollTop);
      } else {
        const mc = document.querySelector('.main-container');
        if (mc) mc.scrollTop = this.savedScrollTop;
      }

      // 4. Laisser un court instant (le temps que le scroll se stabilise)
      //    puis faire disparaître le blur en fondu
      setTimeout(() => {
        hideTransitionOverlay();
      }, 1000);
    });
  }

  lockBodyScroll() {
    document.body.classList.add('overlay-open');
    document.documentElement.classList.add('overlay-open');
  }

  unlockBodyScroll() {
    document.body.classList.remove('overlay-open');
    document.documentElement.classList.remove('overlay-open');
  }
}

const overlayManager = new OverlayManager();

function initializeBlogTiles() {
  document.querySelectorAll('.blog-tile').forEach(tile => {
    tile.addEventListener('click', function() {
      const idx = parseInt(this.getAttribute('data-post-index'));
      const post = blogPosts[idx];
      if (post) {
        const content = `
          <h2>
            ${post.title}
            <button class="blog-overlay-btn" id="blogOverlayClose">↵</button>
          </h2>
          <div>${post.content}</div>`;
        overlayManager.open(content);
      }
    });
  });
}

function initializeNavigation() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.getAttribute('href');
      const target = document.querySelector(href);
      if (target) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll(`a[href="${href}"]`).forEach(l => l.classList.add('active'));
        target.scrollIntoView({ behavior: 'smooth' });
        const navbar = document.querySelector('.navbar-collapse');
        if (navbar && navbar.classList.contains('show')) navbar.classList.remove('show');
      }
    });
  });
}

async function generateContent() {
  const container = document.getElementById('content-container');
  await loadAllMarkdownFiles();
  generateMenu();

  let html = '';
  sections.forEach((section, index) => {
    const carousel = index === 0 ? generateFirstSection() : '';
    let tiles = '';
    if (section.posts && section.posts.length > 0) {
      const tilesHTML = section.posts.map((post) => `
        <div class="blog-tile" data-post-index="${blogPosts.indexOf(post)}">
          <div class="blog-tile-title">${post.title}</div>
          <div class="blog-tile-excerpt">${post.excerpt}</div>
        </div>`).join('');
      tiles = `<div class="blog-tiles">${tilesHTML}</div>`;
    }
    html += `
      <article id="${section.id}">
        <h2>${section.label}</h2>
        ${carousel}
        <div class="content-section">${section.content}</div>
        ${tiles}
      </article>`;
  });

  container.innerHTML = html;
  initializeNavigation();
  initializeBlogTiles();
}

document.addEventListener('DOMContentLoaded', async () => {
  const ok = await loadConfig();
  if (!ok) {
    document.getElementById('content-container').innerHTML =
      '<div class="alert alert-danger">Erreur : Fichier config.ini non trouvé.</div>';
    return;
  }
  generateDesktopCarousel();
  await generateContent();
});

fetch('codex.ini')
  .then(response => response.text())
  .then(data => {
    const formId = data.split('=')[1].trim();
    const form = document.getElementById('myForm');
    if (form) form.action = `${formId}`;
  })
  .catch(err => console.error(err));

document.getElementById("year").textContent = new Date().getFullYear();
